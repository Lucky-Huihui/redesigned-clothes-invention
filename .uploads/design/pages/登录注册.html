<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>衣橱搭配 - 登录</title>
    <style id="theme-vars">
:root {
  /* === Brand Identity === */
  --color-primary: #E8A0BF;
  --color-primary-hover: #D98AAE;
  --color-primary-light: #F5D5E5;
  --color-primary-bg: #FDF2F8;
  --color-primary-subtle: #FCEEF5;

  /* === Neutral Palette === */
  --color-bg: #FFFFFF;
  --color-bg-secondary: #F9FAFB;
  --color-bg-tertiary: #F3F4F6;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-border: #E5E7EB;
  --color-border-light: #F3F4F6;
  --color-divider: #F3F4F6;

  /* === Text === */
  --color-text-primary: #111827;
  --color-text-secondary: #6B7280;
  --color-text-tertiary: #9CA3AF;
  --color-text-inverse: #FFFFFF;
  --color-text-on-primary: #FFFFFF;

  /* === State Colors === */
  --state-success: #10B981;
  --state-warning: #F59E0B;
  --state-error: #EF4444;
  --state-info: #3B82F6;

  /* === Accent (Rose Gold) === */
  --color-accent: #B76E79;
  --color-accent-light: #D4A0A7;

  /* === Typography === */
  --font-family-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-family-display: 'Inter', 'Noto Sans SC', sans-serif;

  --font-size-xs: 0.75rem;
  --font-size-sm: 0.875rem;
  --font-size-base: 1rem;
  --font-size-lg: 1.125rem;
  --font-size-xl: 1.25rem;
  --font-size-2xl: 1.5rem;
  --font-size-3xl: 1.875rem;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* === Spacing === */
  --spacing-xs: 0.25rem;
  --spacing-sm: 0.5rem;
  --spacing-md: 1rem;
  --spacing-lg: 1.5rem;
  --spacing-xl: 2rem;
  --spacing-2xl: 3rem;

  /* === Radius === */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* === Shadow === */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.03);

  /* === Transition === */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;

  /* === Z-index === */
  --z-dropdown: 10;
  --z-sticky: 20;
  --z-modal-backdrop: 40;
  --z-modal: 50;
  --z-toast: 60;
}

/* === Male Theme Override === */
[data-theme="male"] {
  --color-primary: #3B5998;
  --color-primary-hover: #2D4373;
  --color-primary-light: #C5D3E8;
  --color-primary-bg: #EFF3FA;
  --color-primary-subtle: #E8EDF5;

  --color-accent: #F59E0B;
  --color-accent-light: #FCD34D;

  --color-bg-secondary: #F8FAFC;
  --color-bg-tertiary: #F1F5F9;
  --color-border: #E2E8F0;
  --color-border-light: #F1F5F9;
  --color-divider: #F1F5F9;

  --radius-md: 6px;
  --radius-lg: 10px;
  --radius-xl: 14px;
}

/* === Typography Classes === */
.text-heading-1 {
  font-family: var(--font-family-display);
  font-size: var(--font-size-3xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--line-height-tight);
  color: var(--color-text-primary);
  letter-spacing: -0.025em;
}

.text-heading-2 {
  font-family: var(--font-family-display);
  font-size: var(--font-size-2xl);
  font-weight: var(--font-weight-semibold);
  line-height: var(--line-height-tight);
  color: var(--color-text-primary);
  letter-spacing: -0.015em;
}

.text-heading-3 {
  font-family: var(--font-family-display);
  font-size: var(--font-size-xl);
  font-weight: var(--font-weight-semibold);
  line-height: var(--line-height-tight);
  color: var(--color-text-primary);
}

.text-body {
  font-family: var(--font-family-sans);
  font-size: var(--font-size-base);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
  color: var(--color-text-primary);
}

.text-body-secondary {
  font-family: var(--font-family-sans);
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
  color: var(--color-text-secondary);
}

.text-caption {
  font-family: var(--font-family-sans);
  font-size: var(--font-size-xs);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
  color: var(--color-text-tertiary);
}

.text-label {
  font-family: var(--font-family-sans);
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-medium);
  line-height: var(--line-height-normal);
  color: var(--color-text-secondary);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>

  <!-- Decorative background elements -->
  <svg class="deco-icon" style="top:8%;left:6%;width:48px;height:48px" viewBox="0 0 24 24" fill="none" stroke="#E8A0BF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46 16 2 12 3.46 8 2 3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23Z"/></svg>
  <svg class="deco-icon" style="top:18%;right:8%;width:36px;height:36px" viewBox="0 0 24 24" fill="none" stroke="#E8A0BF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
  <svg class="deco-icon" style="bottom:12%;left:10%;width:40px;height:40px" viewBox="0 0 24 24" fill="none" stroke="#E8A0BF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
  <svg class="deco-icon" style="bottom:22%;right:6%;width:32px;height:32px" viewBox="0 0 24 24" fill="none" stroke="#E8A0BF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>

  <div class="page-wrap">
    <!-- Login Card -->
    <div style="background:var(--color-surface);border-radius:var(--radius-xl);padding:32px 24px 28px;border:1px solid var(--color-border-light);">

      <!-- Logo Area -->
      <div class="flex flex-col items-center" style="margin-bottom:28px;">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none" style="margin-bottom:12px;">
          <rect width="44" height="44" rx="12" fill="var(--color-primary-bg)"/>
          <path d="M22 10c-1.5 0-3 .6-4 1.5C17 10.6 15.5 10 14 10c-3.3 0-6 2.7-6 6v10c0 2.2 1.8 4 4 4h20c2.2 0 4-1.8 4-4V16c0-3.3-2.7-6-6-6-1.5 0-3 .6-4 1.5C25 10.6 23.5 10 22 10z" fill="var(--color-primary)" opacity="0.85"/>
          <path d="M14 14c-1.1 0-2 .9-2 2v8h4v-8c0-1.1-.9-2-2-2z" fill="var(--color-surface)" opacity="0.6"/>
          <path d="M22 14c-1.1 0-2 .9-2 2v8h4v-8c0-1.1-.9-2-2-2z" fill="var(--color-surface)" opacity="0.6"/>
          <path d="M30 14c-1.1 0-2 .9-2 2v8h4v-8c0-1.1-.9-2-2-2z" fill="var(--color-surface)" opacity="0.6"/>
        </svg>
        <h1 style="font-family:var(--font-family-display);font-size:var(--font-size-2xl);font-weight:var(--font-weight-bold);color:var(--color-text-primary);margin:0;letter-spacing:-0.02em;text-wrap:balance;">衣橱搭配</h1>
        <p style="font-size:var(--font-size-sm);color:var(--color-text-tertiary);margin:6px 0 0;">智能管理你的每一件衣物</p>
      </div>

      <!-- Tab Switcher -->
      <div class="flex" style="gap:32px;margin-bottom:24px;border-bottom:1px solid var(--color-border-light);">
        <button class="tab-btn active" id="tab-login" type="button"
          style="background:none;border:none;font-size:var(--font-size-base);color:var(--color-primary);cursor:pointer;font-family:var(--font-family-sans);padding:0 0 10px;"
          onclick="switchTab('login')">登录</button>
        <button class="tab-btn" id="tab-register" type="button"
          style="background:none;border:none;font-size:var(--font-size-base);color:var(--color-text-tertiary);cursor:pointer;font-family:var(--font-family-sans);padding:0 0 10px;"
          onclick="switchTab('register')">注册</button>
      </div>

      <!-- Login Form -->
      <div class="form-panel active" id="panel-login">
        <form onsubmit="return false;" autocomplete="off">
          <!-- Phone / Email -->
          <div style="margin-bottom:16px;">
            <label style="display:block;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);color:var(--color-text-secondary);margin-bottom:6px;">手机号 / 邮箱</label>
            <div class="relative">
              <svg class="absolute" style="left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--color-text-tertiary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              <input type="text" placeholder="请输入手机号或邮箱" class="form-input"
                style="width:100%;height:48px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-bg-secondary);padding:0 12px 0 40px;font-size:var(--font-size-base);color:var(--color-text-primary);font-family:var(--font-family-sans);">
            </div>
          </div>
          <!-- Password -->
          <div style="margin-bottom:24px;">
            <label style="display:block;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);color:var(--color-text-secondary);margin-bottom:6px;">密码</label>
            <div class="relative">
              <svg class="absolute" style="left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--color-text-tertiary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" placeholder="请输入密码" class="form-input"
                style="width:100%;height:48px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-bg-secondary);padding:0 12px 0 40px;font-size:var(--font-size-base);color:var(--color-text-primary);font-family:var(--font-family-sans);">
            </div>
          </div>
          <!-- Submit -->
          <button type="submit" data-dom-id="login-submit" class="btn-primary"
            style="width:100%;height:48px;border-radius:var(--radius-full);background:var(--color-primary);color:var(--color-text-on-primary);border:none;font-size:var(--font-size-base);font-weight:var(--font-weight-semibold);cursor:pointer;font-family:var(--font-family-sans);">
            登录
          </button>
          <!-- Register link -->
          <p style="text-align:center;margin-top:16px;font-size:var(--font-size-sm);color:var(--color-text-tertiary);">
            还没有账号？<a href="javascript:void(0)" onclick="switchTab('register')" style="color:var(--color-primary);text-decoration:none;font-weight:var(--font-weight-medium);">立即注册</a>
          </p>
        </form>
      </div>

      <!-- Register Form -->
      <div class="form-panel" id="panel-register">
        <form onsubmit="return false;" autocomplete="off">
          <!-- Phone / Email -->
          <div style="margin-bottom:16px;">
            <label style="display:block;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);color:var(--color-text-secondary);margin-bottom:6px;">手机号 / 邮箱</label>
            <div class="relative">
              <svg class="absolute" style="left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--color-text-tertiary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              <input type="text" placeholder="请输入手机号或邮箱" class="form-input"
                style="width:100%;height:48px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-bg-secondary);padding:0 12px 0 40px;font-size:var(--font-size-base);color:var(--color-text-primary);font-family:var(--font-family-sans);">
            </div>
          </div>
          <!-- Verification Code -->
          <div style="margin-bottom:16px;">
            <label style="display:block;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);color:var(--color-text-secondary);margin-bottom:6px;">验证码</label>
            <div class="flex" style="gap:10px;">
              <div class="relative flex-1">
                <svg class="absolute" style="left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--color-text-tertiary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                <input type="text" placeholder="请输入验证码" class="form-input"
                  style="width:100%;height:48px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-bg-secondary);padding:0 12px 0 40px;font-size:var(--font-size-base);color:var(--color-text-primary);font-family:var(--font-family-sans);">
              </div>
              <button type="button"
                style="flex-shrink:0;height:48px;border-radius:var(--radius-md);border:1px solid var(--color-primary);background:var(--color-primary-bg);color:var(--color-primary);font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);cursor:pointer;padding:0 14px;white-space:nowrap;font-family:var(--font-family-sans);transition:opacity 160ms cubic-bezier(.2,.8,.2,1);"
                onmousedown="this.style.opacity='0.8'" onmouseup="this.style.opacity='1'" onmouseleave="this.style.opacity='1'">
                获取验证码
              </button>
            </div>
          </div>
          <!-- Password -->
          <div style="margin-bottom:16px;">
            <label style="display:block;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);color:var(--color-text-secondary);margin-bottom:6px;">密码</label>
            <div class="relative">
              <svg class="absolute" style="left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--color-text-tertiary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" placeholder="请设置密码" class="form-input"
                style="width:100%;height:48px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-bg-secondary);padding:0 12px 0 40px;font-size:var(--font-size-base);color:var(--color-text-primary);font-family:var(--font-family-sans);">
            </div>
          </div>
          <!-- Confirm Password -->
          <div style="margin-bottom:16px;">
            <label style="display:block;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);color:var(--color-text-secondary);margin-bottom:6px;">确认密码</label>
            <div class="relative">
              <svg class="absolute" style="left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--color-text-tertiary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
              <input type="password" placeholder="请再次输入密码" class="form-input"
                style="width:100%;height:48px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-bg-secondary);padding:0 12px 0 40px;font-size:var(--font-size-base);color:var(--color-text-primary);font-family:var(--font-family-sans);">
            </div>
          </div>
          <!-- Gender Selector -->
          <div style="margin-bottom:24px;">
            <label style="display:block;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);color:var(--color-text-secondary);margin-bottom:8px;">性别</label>
            <div class="flex" style="gap:10px;">
              <button type="button" class="gender-btn" id="gender-female"
                style="flex:1;height:44px;border-radius:var(--radius-md);border:1px solid var(--color-primary);background:var(--color-primary);color:var(--color-text-on-primary);font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);cursor:pointer;font-family:var(--font-family-sans);"
                onclick="selectGender('female')">女</button>
              <button type="button" class="gender-btn" id="gender-male"
                style="flex:1;height:44px;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-bg-secondary);color:var(--color-text-secondary);font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);cursor:pointer;font-family:var(--font-family-sans);"
                onclick="selectGender('male')">男</button>
            </div>
          </div>
          <!-- Submit -->
          <button type="submit" class="btn-primary"
            style="width:100%;height:48px;border-radius:var(--radius-full);background:var(--color-primary);color:var(--color-text-on-primary);border:none;font-size:var(--font-size-base);font-weight:var(--font-weight-semibold);cursor:pointer;font-family:var(--font-family-sans);">
            注册
          </button>
          <!-- Login link -->
          <p style="text-align:center;margin-top:16px;font-size:var(--font-size-sm);color:var(--color-text-tertiary);">
            已有账号？<a href="javascript:void(0)" onclick="switchTab('login')" style="color:var(--color-primary);text-decoration:none;font-weight:var(--font-weight-medium);">立即登录</a>
          </p>
        </form>
      </div>

    </div>
  </div>

  <script>
    function switchTab(tab) {
      var loginTab = document.getElementById('tab-login');
      var registerTab = document.getElementById('tab-register');
      var loginPanel = document.getElementById('panel-login');
      var registerPanel = document.getElementById('panel-register');

      if (tab === 'login') {
        loginTab.classList.add('active');
        loginTab.style.color = 'var(--color-primary)';
        registerTab.classList.remove('active');
        registerTab.style.color = 'var(--color-text-tertiary)';
        loginPanel.classList.add('active');
        registerPanel.classList.remove('active');
      } else {
        registerTab.classList.add('active');
        registerTab.style.color = 'var(--color-primary)';
        loginTab.classList.remove('active');
        loginTab.style.color = 'var(--color-text-tertiary)';
        registerPanel.classList.add('active');
        loginPanel.classList.remove('active');
      }
    }

    function selectGender(gender) {
      var femaleBtn = document.getElementById('gender-female');
      var maleBtn = document.getElementById('gender-male');

      if (gender === 'female') {
        femaleBtn.style.background = 'var(--color-primary)';
        femaleBtn.style.borderColor = 'var(--color-primary)';
        femaleBtn.style.color = 'var(--color-text-on-primary)';
        maleBtn.style.background = 'var(--color-bg-secondary)';
        maleBtn.style.borderColor = 'var(--color-border)';
        maleBtn.style.color = 'var(--color-text-secondary)';
      } else {
        maleBtn.style.background = 'var(--color-primary)';
        maleBtn.style.borderColor = 'var(--color-primary)';
        maleBtn.style.color = 'var(--color-text-on-primary)';
        femaleBtn.style.background = 'var(--color-bg-secondary)';
        femaleBtn.style.borderColor = 'var(--color-border)';
        femaleBtn.style.color = 'var(--color-text-secondary)';
      }
    }
  </script>

    <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-family-sans);
      background: linear-gradient(180deg, #FDF2F8 0%, #FCEEF5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }
    .page-wrap {
      width: 100%;
      max-width: 375px;
    }
    /* Tab underline indicator */
    .tab-btn {
      position: relative;
      padding-bottom: 10px;
      transition: color 160ms cubic-bezier(.2,.8,.2,1);
    }
    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 2.5px;
      border-radius: 2px;
      background: var(--color-primary);
      transition: width 240ms cubic-bezier(.3,0,0,1);
    }
    .tab-btn.active::after {
      width: 32px;
    }
    .tab-btn.active {
      color: var(--color-primary);
      font-weight: var(--font-weight-semibold);
    }
    /* Input focus ring */
    .form-input {
      transition: border-color 160ms cubic-bezier(.2,.8,.2,1), box-shadow 160ms cubic-bezier(.2,.8,.2,1);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2.5px rgba(232, 160, 191, 0.2);
    }
    /* Primary button */
    .btn-primary {
      transition: background-color 160ms cubic-bezier(.2,.8,.2,1), transform 120ms cubic-bezier(.2,.8,.2,1);
    }
    .btn-primary:active {
      transform: scale(0.98);
    }
    /* Gender toggle */
    .gender-btn {
      transition: background-color 160ms cubic-bezier(.2,.8,.2,1), color 160ms cubic-bezier(.2,.8,.2,1);
    }
    /* Decorative clothing icons */
    .deco-icon {
      opacity: 0.06;
      position: absolute;
      pointer-events: none;
    }
    /* Form panel transition */
    .form-panel {
      display: none;
    }
    .form-panel.active {
      display: block;
      animation: fadeSlideIn 240ms cubic-bezier(.3,0,0,1);
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .form-panel.active { animation: none; }
      .tab-btn::after { transition: none; }
    }
  </style>
</body>
</html>
