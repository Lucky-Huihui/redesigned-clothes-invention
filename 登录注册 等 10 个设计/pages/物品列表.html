<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物品列表</title>
    <style id="theme-vars">
:root {
  /* === Brand Identity === */
  --color-primary: #E8A0BF;
  --color-primary-hover: #D98AAE;
  --color-primary-light: #F5D5E5;
  --color-primary-bg: #FDF2F8;
  --color-primary-subtle: #FCEEF5;

  /* === Neutral Palette === */
  --color-bg: #FFFFFF;
  --color-bg-secondary: #F9FAFB;
  --color-bg-tertiary: #F3F4F6;
  --color-surface: #FFFFFF;
  --color-surface-elevated: #FFFFFF;
  --color-border: #E5E7EB;
  --color-border-light: #F3F4F6;
  --color-divider: #F3F4F6;

  /* === Text === */
  --color-text-primary: #111827;
  --color-text-secondary: #6B7280;
  --color-text-tertiary: #9CA3AF;
  --color-text-inverse: #FFFFFF;
  --color-text-on-primary: #FFFFFF;

  /* === State Colors === */
  --state-success: #10B981;
  --state-warning: #F59E0B;
  --state-error: #EF4444;
  --state-info: #3B82F6;

  /* === Accent (Rose Gold) === */
  --color-accent: #B76E79;
  --color-accent-light: #D4A0A7;

  /* === Typography === */
  --font-family-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-family-display: 'Inter', 'Noto Sans SC', sans-serif;

  --font-size-xs: 0.75rem;
  --font-size-sm: 0.875rem;
  --font-size-base: 1rem;
  --font-size-lg: 1.125rem;
  --font-size-xl: 1.25rem;
  --font-size-2xl: 1.5rem;
  --font-size-3xl: 1.875rem;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* === Spacing === */
  --spacing-xs: 0.25rem;
  --spacing-sm: 0.5rem;
  --spacing-md: 1rem;
  --spacing-lg: 1.5rem;
  --spacing-xl: 2rem;
  --spacing-2xl: 3rem;

  /* === Radius === */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* === Shadow === */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.05);
  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.03);

  /* === Transition === */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;

  /* === Z-index === */
  --z-dropdown: 10;
  --z-sticky: 20;
  --z-modal-backdrop: 40;
  --z-modal: 50;
  --z-toast: 60;
}

/* === Male Theme Override === */
[data-theme="male"] {
  --color-primary: #3B5998;
  --color-primary-hover: #2D4373;
  --color-primary-light: #C5D3E8;
  --color-primary-bg: #EFF3FA;
  --color-primary-subtle: #E8EDF5;

  --color-accent: #F59E0B;
  --color-accent-light: #FCD34D;

  --color-bg-secondary: #F8FAFC;
  --color-bg-tertiary: #F1F5F9;
  --color-border: #E2E8F0;
  --color-border-light: #F1F5F9;
  --color-divider: #F1F5F9;

  --radius-md: 6px;
  --radius-lg: 10px;
  --radius-xl: 14px;
}

/* === Typography Classes === */
.text-heading-1 {
  font-family: var(--font-family-display);
  font-size: var(--font-size-3xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--line-height-tight);
  color: var(--color-text-primary);
  letter-spacing: -0.025em;
}

.text-heading-2 {
  font-family: var(--font-family-display);
  font-size: var(--font-size-2xl);
  font-weight: var(--font-weight-semibold);
  line-height: var(--line-height-tight);
  color: var(--color-text-primary);
  letter-spacing: -0.015em;
}

.text-heading-3 {
  font-family: var(--font-family-display);
  font-size: var(--font-size-xl);
  font-weight: var(--font-weight-semibold);
  line-height: var(--line-height-tight);
  color: var(--color-text-primary);
}

.text-body {
  font-family: var(--font-family-sans);
  font-size: var(--font-size-base);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
  color: var(--color-text-primary);
}

.text-body-secondary {
  font-family: var(--font-family-sans);
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
  color: var(--color-text-secondary);
}

.text-caption {
  font-family: var(--font-family-sans);
  font-size: var(--font-size-xs);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
  color: var(--color-text-tertiary);
}

.text-label {
  font-family: var(--font-family-sans);
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-medium);
  line-height: var(--line-height-normal);
  color: var(--color-text-secondary);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background: var(--color-bg-secondary);">
    <main class="mx-auto max-w-[375px] min-h-screen relative" style="background: var(--color-bg-secondary);">

      <!-- Top Navigation Bar -->
      <nav class="sticky top-0 z-[var(--z-sticky)] flex items-center justify-between px-4 h-14"
           style="background: var(--color-surface); box-shadow: var(--shadow-sm);">
        <button data-dom-id="back-items"
                class="flex items-center justify-center w-9 h-9 -ml-1 rounded-lg transition-colors duration-150"
                style="color: var(--color-text-primary);"
                aria-label="返回">
          <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </button>
        <h1 class="text-base font-semibold" style="color: var(--color-text-primary); word-break: keep-all;">上装</h1>
        <button class="text-sm font-medium px-2 py-1 rounded-lg transition-colors duration-150"
                style="color: var(--color-primary);"
                aria-label="管理">
          管理
        </button>
      </nav>

      <!-- Waterfall Grid -->
      <div class="px-3 pt-3 pb-24">
        <div class="columns-2 gap-3 space-y-3">

          <!-- Item 1 -->
          <div class="break-inside-avoid rounded-xl overflow-hidden transition-transform duration-200"
               style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="relative">
              <div class="w-full aspect-[3/4] flex items-center justify-center text-4xl" style="background: #FDF2F8;">
                👚
              </div>
              <button class="absolute top-2 right-2 w-7 h-7 rounded-full flex items-center justify-center opacity-60"
                      style="background: var(--color-bg); color: var(--color-text-tertiary);"
                      aria-label="更多操作">
                <i data-lucide="more-horizontal" class="w-4 h-4"></i>
              </button>
            </div>
            <div class="px-3 pt-2 pb-3">
              <p class="text-sm font-medium leading-tight" style="color: var(--color-text-primary);">白色T恤</p>
              <div class="flex items-center justify-between mt-1">
                <span class="text-xs" style="color: var(--color-text-tertiary);">2024-03-15</span>
                <span class="text-xs font-medium" style="color: var(--color-primary);">¥299</span>
              </div>
            </div>
          </div>

          <!-- Item 2 -->
          <div class="break-inside-avoid rounded-xl overflow-hidden transition-transform duration-200"
               style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="relative">
              <div class="w-full aspect-[3/3.2] flex items-center justify-center text-4xl" style="background: #EFF6FF;">
                👔
              </div>
              <button class="absolute top-2 right-2 w-7 h-7 rounded-full flex items-center justify-center opacity-60"
                      style="background: var(--color-bg); color: var(--color-text-tertiary);"
                      aria-label="更多操作">
                <i data-lucide="more-horizontal" class="w-4 h-4"></i>
              </button>
            </div>
            <div class="px-3 pt-2 pb-3">
              <p class="text-sm font-medium leading-tight" style="color: var(--color-text-primary);">条纹衬衫</p>
              <div class="flex items-center justify-between mt-1">
                <span class="text-xs" style="color: var(--color-text-tertiary);">2024-03-12</span>
                <span class="text-xs font-medium" style="color: var(--color-primary);">¥459</span>
              </div>
            </div>
          </div>

          <!-- Item 3 -->
          <div class="break-inside-avoid rounded-xl overflow-hidden transition-transform duration-200"
               style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="relative">
              <div class="w-full aspect-[3/4.5] flex items-center justify-center text-4xl" style="background: #F5F3FF;">
                🧥
              </div>
              <button class="absolute top-2 right-2 w-7 h-7 rounded-full flex items-center justify-center opacity-60"
                      style="background: var(--color-bg); color: var(--color-text-tertiary);"
                      aria-label="更多操作">
                <i data-lucide="more-horizontal" class="w-4 h-4"></i>
              </button>
            </div>
            <div class="px-3 pt-2 pb-3">
              <p class="text-sm font-medium leading-tight" style="color: var(--color-text-primary);">牛仔外套</p>
              <div class="flex items-center justify-between mt-1">
                <span class="text-xs" style="color: var(--color-text-tertiary);">2024-02-28</span>
                <span class="text-xs font-medium" style="color: var(--color-primary);">¥699</span>
              </div>
            </div>
          </div>

          <!-- Item 4 -->
          <div class="break-inside-avoid rounded-xl overflow-hidden transition-transform duration-200"
               style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="relative">
              <div class="w-full aspect-[3/3.6] flex items-center justify-center text-4xl" style="background: #FFF7ED;">
                🎽
              </div>
              <button class="absolute top-2 right-2 w-7 h-7 rounded-full flex items-center justify-center opacity-60"
                      style="background: var(--color-bg); color: var(--color-text-tertiary);"
                      aria-label="更多操作">
                <i data-lucide="more-horizontal" class="w-4 h-4"></i>
              </button>
            </div>
            <div class="px-3 pt-2 pb-3">
              <p class="text-sm font-medium leading-tight" style="color: var(--color-text-primary);">针织毛衣</p>
              <div class="flex items-center justify-between mt-1">
                <span class="text-xs" style="color: var(--color-text-tertiary);">2024-02-20</span>
                <span class="text-xs font-medium" style="color: var(--color-primary);">¥389</span>
              </div>
            </div>
          </div>

          <!-- Item 5 -->
          <div class="break-inside-avoid rounded-xl overflow-hidden transition-transform duration-200"
               style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="relative">
              <div class="w-full aspect-[3/4.2] flex items-center justify-center text-4xl" style="background: #ECFDF5;">
                👕
              </div>
              <button class="absolute top-2 right-2 w-7 h-7 rounded-full flex items-center justify-center opacity-60"
                      style="background: var(--color-bg); color: var(--color-text-tertiary);"
                      aria-label="更多操作">
                <i data-lucide="more-horizontal" class="w-4 h-4"></i>
              </button>
            </div>
            <div class="px-3 pt-2 pb-3">
              <p class="text-sm font-medium leading-tight" style="color: var(--color-text-primary);">polo衫</p>
              <div class="flex items-center justify-between mt-1">
                <span class="text-xs" style="color: var(--color-text-tertiary);">2024-02-10</span>
                <span class="text-xs font-medium" style="color: var(--color-primary);">¥199</span>
              </div>
            </div>
          </div>

          <!-- Item 6 -->
          <div class="break-inside-avoid rounded-xl overflow-hidden transition-transform duration-200"
               style="background: var(--color-surface); box-shadow: var(--shadow-card);">
            <div class="relative">
              <div class="w-full aspect-[3/3.4] flex items-center justify-center text-4xl" style="background: #FEF2F2;">
                🧶
              </div>
              <button class="absolute top-2 right-2 w-7 h-7 rounded-full flex items-center justify-center opacity-60"
                      style="background: var(--color-bg); color: var(--color-text-tertiary);"
                      aria-label="更多操作">
                <i data-lucide="more-horizontal" class="w-4 h-4"></i>
              </button>
            </div>
            <div class="px-3 pt-2 pb-3">
              <p class="text-sm font-medium leading-tight" style="color: var(--color-text-primary);">卫衣</p>
              <div class="flex items-center justify-between mt-1">
                <span class="text-xs" style="color: var(--color-text-tertiary);">2024-01-25</span>
                <span class="text-xs font-medium" style="color: var(--color-primary);">¥349</span>
              </div>
            </div>
          </div>

        </div>

        <!-- Empty state hint -->
        <p class="text-center text-xs pt-6 pb-2" style="color: var(--color-text-tertiary);">向下滑动查看更多</p>
      </div>

      <!-- FAB -->
      <button data-dom-id="fab-add"
              class="fixed bottom-6 right-6 w-14 h-14 rounded-full flex items-center justify-center z-[var(--z-modal)] transition-transform duration-200 active:scale-95"
              style="background: var(--color-primary); color: var(--color-text-on-primary); box-shadow: 0 8px 24px -4px rgba(232,160,191,0.45);"
              aria-label="添加物品">
        <i data-lucide="plus" class="w-6 h-6"></i>
      </button>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
